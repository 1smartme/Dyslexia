<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calibration</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Webcam Calibration</h1>
    <p>Position your face so the camera can detect your gaze.</p>

    <div class="video-container">
      <video id="webcam" autoplay muted></video>
    </div>

    <button id="startAssessment">Start Assessment</button>
  </div>

  <script>
    // --- Check student info ---
    const studentInfo = JSON.parse(localStorage.getItem("studentInfo"));
    if (!studentInfo || !studentInfo.name || !studentInfo.age || !studentInfo.grade) {
      alert("Please enter your details first!");
      window.location.href = "/static/index.html";
    }

    // --- Start webcam ---
    const video = document.getElementById("webcam");
    let webcamStream = null;

    async function startWebcam() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        webcamStream = stream;
        video.srcObject = stream;
        video.play();
      } catch (err) {
        console.error("Webcam error:", err);
        alert("❌ Cannot access webcam: " + err);
      }
    }

    startWebcam();

    // --- Start Assessment Button ---
    document.getElementById("startAssessment").addEventListener("click", () => {
      // Stop webcam for calibration page
      if (webcamStream) {
        webcamStream.getTracks().forEach(track => track.stop());
      }

      // Save calibration data
      const calibrationData = {
        timestamp: new Date().toISOString(),
        screen_width: window.screen.width,
        screen_height: window.screen.height,
        viewport_width: window.innerWidth,
        viewport_height: window.innerHeight,
        device_type: /Mobile|Android|iPhone|iPad/.test(navigator.userAgent) ? "Mobile" : "Desktop",
        user_agent: navigator.userAgent,
        calibration_completed: true
      };
      sessionStorage.setItem("calibration_data", JSON.stringify(calibrationData));

      // Set calibration flag
      sessionStorage.setItem("calibration_done", "true");

      // Redirect to assessment
      window.location.href = "/static/assessment.html";
    });
  </script>
</body>
</html>
